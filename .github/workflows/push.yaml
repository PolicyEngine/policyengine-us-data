name: Push to main

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != 'Auto-update pipeline JSON'
    steps:
      - uses: actions/checkout@v4
      - run: pip install ruff>=0.9.0
      - run: ruff format --check .

  # ── Build datasets and run integration tests ────────────────
  build-and-test:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event.head_commit.message != 'Update package version' && github.event.head_commit.message != 'Auto-update pipeline JSON'
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      HUGGING_FACE_TOKEN: ${{ secrets.HUGGING_FACE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install modal
      - name: Build datasets and run integration tests on Modal
        run: |
          modal run modal_app/data_build.py \
            --upload \
            --branch=${{ github.ref_name }}

  # ── Documentation ──────────────────────────────────────────
  docs:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != 'Update package version' && github.event.head_commit.message != 'Auto-update pipeline JSON'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - name: Build documentation
        run: uv run make documentation
        env:
          BASE_URL: /policyengine-us-data
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/_build/html
          clean: true

  # ── Versioning (bump + changelog on non-version-bump pushes) ──
  versioning:
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != 'Update package version' && github.event.head_commit.message != 'Auto-update pipeline JSON'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v5
      - run: pip install towncrier
      - name: Bump version and build changelog
        run: |
          python .github/bump_version.py
          towncrier build --yes --version $(python -c "import re; print(re.search(r'version = \"(.+?)\"', open('pyproject.toml').read()).group(1))")
      - name: Update lockfile
        run: uv lock
      - name: Update changelog
        uses: EndBug/add-and-commit@v9
        with:
          add: "."
          message: Update package version

  # ── Pipeline diagram sync (after versioning) ───────────────
  pipeline-diagram-sync:
    runs-on: ubuntu-latest
    needs: versioning
    if: needs.versioning.result == 'success' && github.event.head_commit.message != 'Update package version' && github.event.head_commit.message != 'Auto-update pipeline JSON'
    permissions:
      contents: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Refresh to latest main after versioning
        run: |
          git fetch origin main
          git checkout --detach FETCH_HEAD

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install extractor dependencies
        run: python -m pip install PyYAML

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: docs/pipeline-diagrams/package-lock.json

      - name: Rebuild pipeline JSON
        run: python scripts/extract_pipeline.py

      - name: Install diagram app dependencies
        working-directory: docs/pipeline-diagrams
        run: npm ci

      - name: Build pipeline diagram docs
        working-directory: docs/pipeline-diagrams
        run: npm run build

      - name: Commit pipeline diagram JSON if changed
        run: |
          if git diff --quiet -- docs/pipeline-diagrams/app/pipeline.json; then
            echo "## Pipeline Diagram Docs" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No generated pipeline JSON changes detected." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pipeline-diagrams/app/pipeline.json
          git commit -m "Auto-update pipeline JSON"
          git push origin HEAD:main
          echo "## Pipeline Diagram Docs" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Updated \`docs/pipeline-diagrams/app/pipeline.json\` on \`main\`. Connected Vercel deployment will pick up that commit." >> "$GITHUB_STEP_SUMMARY"

  # ── PyPI publish (version bump commits only) ────────────────
  publish:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event.head_commit.message == 'Update package version'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI }}
          skip-existing: true
