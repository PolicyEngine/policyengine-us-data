name: Push to main

on:
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: pip install ruff>=0.9.0
      - run: ruff format --check .

  # ── Build and linear integration tests ──────────────────────
  build-and-linear-integration-tests:
    name: Build and linear integration tests
    runs-on: ubuntu-latest
    needs: lint
    if: github.event.head_commit.message != 'Update package version'
    env:
      MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
      MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
      MODAL_ENVIRONMENT: main
      HUGGING_FACE_TOKEN: ${{ secrets.HUGGING_FACE_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - run: pip install modal
      - name: Run linear integration tests on Modal
        run: |
          modal run --env="${MODAL_ENVIRONMENT}" modal_app/data_build.py \
            --upload \
            --branch=${{ github.ref_name }}

  # ── Documentation ──────────────────────────────────────────
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != 'Update package version'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - name: Build documentation
        run: uv run make documentation
        env:
          BASE_URL: /policyengine-us-data
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs/_build/html
          clean: true

  # ── Versioning (bump + changelog on non-version-bump pushes) ──
  versioning:
    name: Versioning
    runs-on: ubuntu-latest
    if: github.event.head_commit.message != 'Update package version'
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v5
      - run: pip install towncrier
      - name: Bump version and build changelog
        run: |
          python .github/bump_version.py
          towncrier build --yes --version "$(python .github/fetch_version.py)"
      - name: Update lockfile
        run: uv lock
      - name: Update changelog
        uses: EndBug/add-and-commit@v9
        with:
          add: "."
          message: Update package version

  # ── PyPI publish (version bump commits only) ────────────────
  publish:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event.head_commit.message == 'Update package version'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --dev
      - run: uv run python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          user: __token__
          password: ${{ secrets.PYPI }}
          skip-existing: true
