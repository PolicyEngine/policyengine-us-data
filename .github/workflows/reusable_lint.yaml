name: Reusable Lint

on:
  workflow_call:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install ruff
        run: uv pip install "ruff>=0.9.0" --system
      - name: Check formatting
        run: ruff format --check .
