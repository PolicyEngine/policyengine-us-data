name: Update Pipeline Diagrams

on:
  push:
    branches: [main]
    paths:
      - "pipeline_stages.yaml"
      - "scripts/extract_pipeline.py"
      - "policyengine_us_data/**/*.py"
      - "docs/pipeline-diagrams/**"
      - ".github/workflows/update_pipeline_diagrams.yaml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-diagrams:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install extractor dependencies
        run: python -m pip install PyYAML

      - name: Generate pipeline JSON
        run: python scripts/extract_pipeline.py

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: docs/pipeline-diagrams/package-lock.json

      - name: Install diagram app dependencies
        working-directory: docs/pipeline-diagrams
        run: npm ci

      - name: Type-check diagram app
        working-directory: docs/pipeline-diagrams
        run: npx tsc --noEmit

      - name: Commit if changed
        run: |
          if git diff --quiet -- docs/pipeline-diagrams/app/pipeline.json; then
            echo "No pipeline JSON changes detected."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/pipeline-diagrams/app/pipeline.json
          git commit -m "Auto-update pipeline JSON"
          git push
