# Pipeline stage definitions and cross-node edges.
# Nodes are defined via @pipeline_node decorators in source code.
# This file defines: stage groupings, input/output/utility nodes, and edges.
# The extraction script merges decorated functions with these definitions.

stages:
  # ══════════════════════════════════════════════════════════════
  # Stage 0: Raw Data Download
  # ══════════════════════════════════════════════════════════════
  - id: 0
    label: "Stage 0"
    title: "Stage 0: Raw Data Download"
    description: "Download raw survey data from Census, IRS, Federal Reserve, and HuggingFace"
    country: us
    extra_nodes:
      - id: cps_url
        label: "Census CPS ASEC"
        node_type: input
        description: "ZIP with CSV files from www2.census.gov"
      - id: acs_url
        label: "Census ACS PUMS"
        node_type: input
        description: "Person + Household CSVs, 1-Year estimates"
      - id: scf_url
        label: "Federal Reserve SCF"
        node_type: input
        description: "Stata format (.dta), Survey of Consumer Finances"
      - id: hf_private
        label: "HuggingFace Private Repo"
        node_type: external
        description: "policyengine/irs-soi-puf — requires HUGGING_FACE_TOKEN"
      - id: hf_public
        label: "HuggingFace Public Repo"
        node_type: external
        description: "policyengine/policyengine-us-data — SIPP, block distributions, policy_data.db"
      - id: download_http
        label: "HTTP Download + ZIP Extract"
        node_type: process
        description: "requests.get() with streaming, tqdm progress bar"
      - id: download_hf
        label: "HuggingFace Hub Download"
        node_type: process
        description: "hf_hub_download(), token-authenticated for private repos"
      - id: csv_parse
        label: "CSV/Stata Parsing"
        node_type: process
        description: "pandas read_csv/read_stata, entity table construction"
      - id: out_cps_raw
        label: "census_cps_2024.h5"
        node_type: output
        description: "5 entity tables: Person, Family, Household, Tax Unit, SPM Unit"
      - id: out_acs_raw
        label: "census_acs_2022.h5"
        node_type: output
        description: "Person + Household tables"
      - id: out_puf_raw
        label: "irs_puf_2015.h5"
        node_type: output
        description: "PUF + Demographics tables"
      - id: out_soi
        label: "soi.csv"
        node_type: output
        description: "SOI aggregate statistics"
      - id: out_scf
        label: "SCF raw data"
        node_type: output
        description: "Stata → DataFrame, auto loans + net worth"
      - id: out_sipp
        label: "pu2023_slim.csv"
        node_type: output
        description: "SIPP microdata (pipe-delimited)"
      - id: out_block
        label: "block_cd_distributions.csv.gz"
        node_type: output
        description: "Census block populations, block-to-CD crosswalk"
      - id: out_pop
        label: "np2023_d5_mid.csv"
        node_type: output
        description: "Census population projections"
      - id: out_calibration_db
        label: "policy_data.db"
        node_type: output
        description: "SQLite calibration targets database"
      - id: util_storage
        label: "STORAGE_FOLDER"
        node_type: utility
        description: "policyengine_us_data/storage/ — all downloads cached here"
    edges:
      - source: cps_url
        target: download_http
        edge_type: external_source
        label: "CPS ASEC ZIP"
      - source: acs_url
        target: download_http
        edge_type: external_source
        label: "ACS PUMS CSV"
      - source: scf_url
        target: download_http
        edge_type: external_source
        label: "SCF .dta"
      - source: hf_private
        target: download_hf
        edge_type: external_source
        label: "PUF, demographics, SOI, pop"
      - source: hf_public
        target: download_hf
        edge_type: external_source
        label: "SIPP, block, policy_data.db"
      - source: download_http
        target: csv_parse
        edge_type: data_flow
        label: "raw files"
      - source: download_hf
        target: csv_parse
        edge_type: data_flow
        label: "raw files"
      - source: csv_parse
        target: out_cps_raw
        edge_type: produces_artifact
        label: "census_cps_2024.h5"
      - source: csv_parse
        target: out_acs_raw
        edge_type: produces_artifact
        label: "census_acs_2022.h5"
      - source: csv_parse
        target: out_puf_raw
        edge_type: produces_artifact
        label: "irs_puf_2015.h5"
      - source: csv_parse
        target: out_soi
        edge_type: produces_artifact
        label: "soi.csv"
      - source: download_http
        target: out_scf
        edge_type: produces_artifact
        label: "SCF raw data"
      - source: download_hf
        target: out_sipp
        edge_type: produces_artifact
        label: "pu2023_slim.csv"
      - source: download_hf
        target: out_block
        edge_type: produces_artifact
        label: "block_cd_distributions.csv.gz"
      - source: download_hf
        target: out_pop
        edge_type: produces_artifact
        label: "np2023_d5_mid.csv"
      - source: download_hf
        target: out_calibration_db
        edge_type: produces_artifact
        label: "policy_data.db"

  # ══════════════════════════════════════════════════════════════
  # Stage 1: Base Dataset Construction
  # ══════════════════════════════════════════════════════════════
  - id: 1
    label: "Stage 1"
    title: "Stage 1: Base Dataset Construction"
    description: "Build CPS 2024 and PUF 2024 from raw survey data, donor-based labor-market imputations, and retirement contribution inference"
    country: us
    extra_nodes:
      - id: in_census_cps
        label: "census_cps_2024.h5"
        node_type: input
        description: "Raw CPS ASEC from Stage 0"
      - id: in_census_cps_prev
        label: "census_cps_2023.h5"
        node_type: input
        description: "Previous year CPS for income matching"
      - id: in_acs
        label: "ACS 2022"
        node_type: input
        description: "Training data for rent QRF"
      - id: in_sipp
        label: "SIPP 2023"
        node_type: input
        description: "Training data for tips QRF"
      - id: in_scf
        label: "SCF 2022"
        node_type: input
        description: "Training data for auto loans QRF"
      - id: in_org
        label: "CPS Basic ORG 2024"
        node_type: external
        description: "Monthly CPS basic ORG wage microdata used to train labor-market imputations"
      - id: in_uprating
        label: "uprating_factors.csv"
        node_type: input
        description: "PE uprating factors table"
      - id: out_cps
        label: "cps_2024.h5"
        node_type: output
        description: "Dataset.ARRAYS format, ~65K households (half-sample)"
      - id: out_puf
        label: "puf_2024.h5"
        node_type: output
        description: "Dataset.ARRAYS format"
      - id: in_irs_puf
        label: "irs_puf_2015.h5"
        node_type: input
        description: "Raw IRS PUF from Stage 0"
      - id: in_demographics
        label: "demographics_2015.csv"
        node_type: input
        description: "PUF demographics from HuggingFace"
      - id: in_cps_pension
        label: "CPS_2024 / CPS_2021"
        node_type: input
        description: "CPS donor sample for pension QRF; falls back to CPS_2021 if current CPS is unavailable"
      - id: util_seeded_rng
        label: "seeded_rng()"
        node_type: utility
        description: "Deterministic per-variable RNG"
      - id: util_qrf
        label: "microimpute QRF"
        node_type: utility
        description: "fit_predict() for sequential imputation"
      - id: util_retirement_limits
        label: "get_retirement_limits()"
        node_type: utility
        description: "IRS contribution limits"
    edges:
      # CPS processing chain
      - { source: in_census_cps, target: add_id_variables, edge_type: data_flow, label: "raw CPS tables" }
      - { source: add_id_variables, target: add_personal_variables, edge_type: data_flow }
      - { source: add_personal_variables, target: add_personal_income_variables, edge_type: data_flow }
      - { source: add_personal_income_variables, target: add_previous_year_income, edge_type: data_flow }
      - { source: in_census_cps_prev, target: add_previous_year_income, edge_type: data_flow, label: "prior year PERIDNUM" }
      - { source: add_previous_year_income, target: add_ssn_card_type, edge_type: data_flow }
      - { source: add_ssn_card_type, target: add_spm_variables, edge_type: data_flow }
      - { source: add_spm_variables, target: add_household_variables, edge_type: data_flow }
      - { source: add_household_variables, target: add_rent, edge_type: data_flow }
      - { source: in_acs, target: add_rent, edge_type: external_source, label: "ACS training data" }
      - { source: add_rent, target: add_tips, edge_type: data_flow }
      - { source: in_sipp, target: add_tips, edge_type: external_source, label: "SIPP training data" }
      - { source: add_tips, target: add_org_inputs, edge_type: data_flow }
      - { source: in_org, target: add_org_inputs, edge_type: external_source, label: "ORG donor data" }
      - { source: add_org_inputs, target: add_auto_loan, edge_type: data_flow }
      - { source: in_scf, target: add_auto_loan, edge_type: external_source, label: "SCF training data" }
      - { source: add_auto_loan, target: add_takeup, edge_type: data_flow }
      - { source: add_takeup, target: downsample, edge_type: data_flow }
      - { source: downsample, target: out_cps, edge_type: produces_artifact, label: "cps_2024.h5" }
      # PUF processing chain
      - { source: in_irs_puf, target: preprocess_puf, edge_type: data_flow, label: "raw PUF records" }
      - { source: preprocess_puf, target: simulate_qbi, edge_type: data_flow }
      - { source: simulate_qbi, target: impute_puf_demographics, edge_type: data_flow }
      - { source: in_demographics, target: impute_puf_demographics, edge_type: data_flow, label: "demographics_2015.csv" }
      - { source: impute_puf_demographics, target: impute_puf_pension, edge_type: data_flow }
      - { source: in_cps_pension, target: impute_puf_pension, edge_type: data_flow, label: "CPS donor sample" }
      - { source: impute_puf_pension, target: mortgage_convert, edge_type: data_flow }
      - { source: mortgage_convert, target: out_puf, edge_type: produces_artifact, label: "puf_2024.h5" }
      - { source: in_uprating, target: out_puf, edge_type: data_flow, label: "SOI growth rates" }
      # Utility edges
      - { source: util_seeded_rng, target: add_takeup, edge_type: uses_utility }
      - { source: util_qrf, target: add_rent, edge_type: uses_utility }
      - { source: util_qrf, target: add_tips, edge_type: uses_utility }
      - { source: util_qrf, target: add_org_inputs, edge_type: uses_utility }
      - { source: util_qrf, target: add_auto_loan, edge_type: uses_utility }
      - { source: util_retirement_limits, target: add_personal_income_variables, edge_type: uses_utility }
      - { source: util_qrf, target: impute_puf_demographics, edge_type: uses_utility }
      - { source: util_qrf, target: impute_puf_pension, edge_type: uses_utility }

  # ══════════════════════════════════════════════════════════════
  # Stage 2: Extended CPS (PUF Clone + QRF Imputation)
  # ══════════════════════════════════════════════════════════════
  - id: 2
    label: "Stage 2"
    title: "Stage 2: Extended CPS (PUF Clone)"
    description: "Merge CPS + PUF via cloning, rematch clone features, QRF-impute incomes and CPS-only vars, then finalize Extended CPS inputs"
    country: us
    extra_nodes:
      - id: in_cps_s2
        label: "CPS_2024_Full"
        node_type: input
        description: "From Stage 1 (full sample)"
      - id: in_puf_s2
        label: "PUF_2024"
        node_type: input
        description: "From Stage 1"
      - id: in_blocks_s2
        label: "block_cd_distributions.csv.gz"
        node_type: input
        description: "Census block populations"
      - id: in_scf_s2
        label: "SCF_2022"
        node_type: input
        description: "From Stage 0 (mortgage-balance donor sample)"
      - id: geo_assign_s2
        label: "Geography Assignment"
        node_type: process
        description: "assign_random_geography() — population-weighted block draw"
      - id: out_ext
        label: "extended_cps_2024.h5"
        node_type: output
        description: "~260K households (doubled), CPS half + PUF half"
      - id: util_qrf_s2
        label: "microimpute QRF"
        node_type: utility
        description: "fit_predict() for sequential imputation"
      - id: util_knn_s2
        label: "sklearn NearestNeighbors"
        node_type: utility
        description: "Role-aware donor matching on standardized clone predictors"
    edges:
      - { source: in_cps_s2, target: geo_assign_s2, edge_type: data_flow, label: "CPS records" }
      - { source: in_blocks_s2, target: geo_assign_s2, edge_type: data_flow, label: "block populations" }
      - { source: in_puf_s2, target: record_double, edge_type: data_flow, label: "PUF records" }
      - { source: in_cps_s2, target: record_double, edge_type: data_flow, label: "CPS records" }
      - { source: geo_assign_s2, target: record_double, edge_type: data_flow }
      - { source: record_double, target: qrf_pass1, edge_type: data_flow }
      - { source: qrf_pass1, target: retire_impute, edge_type: data_flow }
      - { source: qrf_pass1, target: weeks_impute, edge_type: data_flow }
      - { source: retire_impute, target: ss_reconcile, edge_type: data_flow }
      - { source: weeks_impute, target: ss_reconcile, edge_type: data_flow }
      - { source: ss_reconcile, target: clone_features, edge_type: data_flow }
      - { source: clone_features, target: cps_only, edge_type: data_flow }
      - { source: cps_only, target: qrf_pass2, edge_type: data_flow }
      - { source: qrf_pass2, target: mortgage_hints, edge_type: data_flow }
      - { source: in_scf_s2, target: mortgage_hints, edge_type: data_flow, label: "SCF donor sample" }
      - { source: mortgage_hints, target: mortgage_convert, edge_type: data_flow }
      - { source: mortgage_convert, target: formula_drop, edge_type: data_flow }
      - { source: formula_drop, target: out_ext, edge_type: produces_artifact }
      - { source: util_qrf_s2, target: qrf_pass1, edge_type: uses_utility }
      - { source: util_qrf_s2, target: cps_only, edge_type: uses_utility }
      - { source: util_qrf_s2, target: mortgage_hints, edge_type: uses_utility }
      - { source: util_knn_s2, target: clone_features, edge_type: uses_utility }

  # ══════════════════════════════════════════════════════════════
  # Stage 3a: Enhanced CPS Reweighting (ECPS — deprecated)
  # ══════════════════════════════════════════════════════════════
  - id: "3a"
    label: "Stage 3a"
    title: "Stage 3a: Enhanced CPS Reweighting"
    description: "Reweight Extended CPS to match national IRS/Census/CBO targets, then apply the 2025 ACA post-calibration override (deprecated ECPS pathway)"
    country: us
    extra_nodes:
      - id: in_ext_half
        label: "ExtendedCPS_2024_Half"
        node_type: input
        description: "Half-sample from Stage 2"
      - id: build_loss
        label: "build_loss_matrix()"
        node_type: process
        description: "Hundreds of calibration targets — returns (matrix, target_vector)"
      - id: t_soi
        label: "IRS SOI"
        node_type: external
        description: "AGI, income types, filer counts by AGI band / filing status"
      - id: t_census
        label: "Census Population"
        node_type: external
        description: "86 single-year age groups from np2023_d5_mid.csv"
      - id: t_cbo
        label: "CBO Budget"
        node_type: external
        description: "Income tax, SNAP, SS, SSI, UC"
      - id: t_state
        label: "State Targets"
        node_type: us_specific
        description: "50 states + DC — population, AGI, ACA, SNAP, age groups"
      - id: t_jct
        label: "JCT Tax Expenditures"
        node_type: external
        description: "SALT, medical, charitable — counterfactual simulations"
      - id: weight_validate
        label: "Weight Validation"
        node_type: process
        description: "No NaN, no negatives — 100M < total HH < 200M"
      - id: out_enhanced
        label: "enhanced_cps_2024.h5"
        node_type: output
        description: "Reweighted production simulation dataset"
      - id: util_loss
        label: "build_loss_matrix()"
        node_type: utility
        description: "utils/loss.py"
      - id: util_l0_s3
        label: "HardConcrete L0"
        node_type: utility
        description: "utils/l0.py"
    edges:
      - { source: in_ext_half, target: build_loss, edge_type: data_flow }
      - { source: t_soi, target: build_loss, edge_type: external_source }
      - { source: t_census, target: build_loss, edge_type: external_source }
      - { source: t_cbo, target: build_loss, edge_type: external_source }
      - { source: t_jct, target: build_loss, edge_type: external_source }
      - { source: t_state, target: build_loss, edge_type: external_source }
      - { source: build_loss, target: reweight, edge_type: data_flow, label: "(matrix, targets)" }
      - { source: reweight, target: weight_validate, edge_type: data_flow }
      - { source: weight_validate, target: aca_2025_override, edge_type: data_flow }
      - { source: aca_2025_override, target: out_enhanced, edge_type: produces_artifact }
      - { source: util_loss, target: build_loss, edge_type: uses_utility }
      - { source: util_l0_s3, target: reweight, edge_type: uses_utility }

  # ══════════════════════════════════════════════════════════════
  # Stage 3b: Stratified CPS (Local area pathway)
  # ══════════════════════════════════════════════════════════════
  - id: "3b"
    label: "Stage 3b"
    title: "Stage 3b: Stratified CPS"
    description: "Stratify Extended CPS by income — keep top 1%, sample remaining 99%"
    country: us
    groups:
      - id: create_stratified
        label: "create_stratified_cps_dataset()"
        description: "Wrapper around AGI calculation, top-1% retention, and sampling into the stratified CPS artifact"
        node_ids: [calc_agi, strat_top, strat_sample, out_strat]
    extra_nodes:
      - id: in_ext_cps
        label: "extended_cps_2024.h5"
        node_type: input
        description: "From Stage 2 (~260K HH)"
      - id: calc_agi
        label: "Calculate AGI"
        node_type: process
        description: "Microsimulation.calculate() — adjusted_gross_income mapped to household"
      - id: strat_top
        label: "Retain Top 1% by AGI"
        node_type: process
        description: "All high-income households kept — preserves tail representation"
      - id: strat_sample
        label: "Uniform Sample Remaining 99%"
        node_type: process
        description: "Target: ~12,000 households — optional 1.5x oversample of bottom 25%"
      - id: out_strat
        label: "stratified_extended_cps_2024.h5"
        node_type: output
        description: "~12K households — input to Stages 4-8"
    edges:
      - { source: in_ext_cps, target: calc_agi, edge_type: data_flow }
      - { source: calc_agi, target: strat_top, edge_type: data_flow }
      - { source: strat_top, target: strat_sample, edge_type: data_flow }
      - { source: strat_top, target: out_strat, edge_type: data_flow, label: "top 1%" }
      - { source: strat_sample, target: out_strat, edge_type: data_flow, label: "sampled 99%" }

  # ══════════════════════════════════════════════════════════════
  # Stage 4: Source Imputation (ACS + SIPP + SCF)
  # ══════════════════════════════════════════════════════════════
  - id: 4
    label: "Stage 4"
    title: "Stage 4: Source Imputation (ACS + SIPP + SCF)"
    description: "Impute wealth/assets from external surveys onto stratified CPS via QRF"
    country: us
    extra_nodes:
      - id: in_strat_s4
        label: "stratified_extended_cps_2024.h5"
        node_type: input
        description: "From Stage 3 (~12K HH)"
      - id: in_acs_s4
        label: "ACS_2022"
        node_type: input
        description: "American Community Survey — has state_fips predictor"
      - id: in_sipp_s4
        label: "SIPP 2023"
        node_type: external
        description: "pu2023_slim.csv from HuggingFace"
      - id: in_scf_s4
        label: "SCF_2022"
        node_type: input
        description: "Survey of Consumer Finances — 50% random subsample"
      - id: sipp_assets_qrf
        label: "SIPP Assets QRF"
        node_type: process
        description: "5 predictors — imputes bank_account_assets, stock_assets, bond_assets"
      - id: out_imputed
        label: "source_imputed_stratified_extended_cps.h5"
        node_type: output
        description: "Enriched with ACS/SIPP/SCF vars — uploaded to HuggingFace"
      - id: util_clone_assign
        label: "clone_and_assign.py"
        node_type: utility
        description: "Geography assignment"
      - id: util_qrf_s4
        label: "microimpute QRF"
        node_type: utility
        description: "fit_predict() for sequential imputation"
    edges:
      - { source: in_strat_s4, target: geo_assign_s4, edge_type: data_flow }
      - { source: geo_assign_s4, target: acs_qrf, edge_type: data_flow, label: "state_fips" }
      - { source: in_acs_s4, target: acs_qrf, edge_type: data_flow }
      - { source: in_sipp_s4, target: sipp_tips_qrf, edge_type: external_source }
      - { source: in_sipp_s4, target: sipp_assets_qrf, edge_type: external_source }
      - { source: in_scf_s4, target: scf_qrf, edge_type: external_source }
      - { source: acs_qrf, target: sipp_tips_qrf, edge_type: data_flow, label: "chain" }
      - { source: sipp_tips_qrf, target: sipp_assets_qrf, edge_type: data_flow, label: "chain" }
      - { source: sipp_assets_qrf, target: scf_qrf, edge_type: data_flow, label: "chain" }
      - { source: scf_qrf, target: out_imputed, edge_type: produces_artifact }
      - { source: util_clone_assign, target: geo_assign_s4, edge_type: uses_utility }
      - { source: util_qrf_s4, target: acs_qrf, edge_type: uses_utility }
      - { source: util_qrf_s4, target: sipp_tips_qrf, edge_type: uses_utility }
      - { source: util_qrf_s4, target: sipp_assets_qrf, edge_type: uses_utility }
      - { source: util_qrf_s4, target: scf_qrf, edge_type: uses_utility }

  # ══════════════════════════════════════════════════════════════
  # Stage 5: Matrix Build (Calibration Target Construction)
  # ══════════════════════════════════════════════════════════════
  - id: 5
    label: "Stage 5"
    title: "Stage 5: Matrix Build (Calibration Target Construction)"
    description: "Build sparse calibration matrix (targets × households × clones)"
    country: us
    groups:
      - id: run_calibration_build
        label: "run_calibration()"
        description: "Build phase: resolve targets and constraints, assemble clone values, and package the sparse calibration matrix"
        node_ids: [target_resolve, target_uprate, geo_build, constraint_resolve, state_precomp, clone_assembly, takeup_rerand, sparse_build, out_pkg]
    extra_nodes:
      - id: in_cps_s5
        label: "source_imputed_stratified_extended_cps.h5"
        node_type: input
        description: "From Stage 4 (~12K HH)"
      - id: in_db_s5
        label: "policy_data.db"
        node_type: external
        description: "SQLite calibration database — 10-step ETL"
      - id: in_config_s5
        label: "target_config.yaml"
        node_type: input
        description: "Active target include list"
